<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0d0d">
<title>150G — Protein Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0d0d0d;
  --surface: #161616;
  --card: #1c1c1c;
  --border: #2a2a2a;
  --accent: #c8f135;
  --text: #f0f0f0;
  --muted: #666;
  --red: #ff4d4d;
  --orange: #ff9a3c;
  --blue: #8ec5f7;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
}

.app {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 32px 80px;
}

/* HEADER */
header {
  padding: 44px 0 28px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  gap: 16px;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 68px;
  line-height: 1;
  letter-spacing: 3px;
  color: var(--accent);
}
.logo span { color: var(--text); }
.logo-sub {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 4px;
}

.header-right { text-align: right; }
.protein-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 56px;
  line-height: 1;
  color: var(--accent);
}
.protein-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; }

/* PROGRESS */
.progress-section { padding: 22px 0 0; }
.prog-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
.prog-track { height: 6px; background: var(--border); border-radius: 999px; overflow: hidden; }
.prog-fill {
  height: 100%; border-radius: 999px; background: var(--accent);
  transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1), background 0.4s;
}
.over-warn { font-size: 12px; color: var(--orange); margin-top: 6px; }

/* ACTION BAR */
.action-bar {
  display: flex; gap: 12px;
  padding: 22px 0 26px;
  flex-wrap: wrap;
}

.btn-shuffle {
  flex: 1; min-width: 180px;
  padding: 15px 24px;
  background: var(--accent);
  color: #0d0d0d;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px; letter-spacing: 3px;
  border: none; border-radius: 10px; cursor: pointer;
  transition: transform 0.12s, background 0.12s;
}
.btn-shuffle:hover { background: #d6ff3d; transform: translateY(-1px); }
.btn-shuffle:active { transform: scale(0.97); }

.btn-save {
  padding: 15px 28px;
  background: none;
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text); font-size: 14px; font-weight: 500;
  cursor: pointer; white-space: nowrap;
  transition: border-color 0.15s, background 0.15s;
}
.btn-save:hover { border-color: var(--accent); background: rgba(200,241,53,0.05); }
.btn-save:active { transform: scale(0.98); }

/* MAIN GRID */
.main-grid {
  display: grid;
  grid-template-columns: 1fr 300px;
  gap: 24px;
  align-items: start;
}

/* MEAL CARDS */
.meals-col { display: flex; flex-direction: column; gap: 14px; }

.meal-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden;
  transition: border-color 0.2s, transform 0.15s;
}
.meal-card:hover { border-color: #3a3a3a; transform: translateY(-1px); }

.meal-head {
  padding: 12px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.meal-type-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px; letter-spacing: 2px; color: var(--muted);
}
.prot-badge {
  font-size: 12px; font-weight: 600;
  padding: 3px 12px; border-radius: 999px;
  background: rgba(200,241,53,0.12); color: var(--accent);
  border: 1px solid rgba(200,241,53,0.22);
}

.meal-body { padding: 18px; display: flex; align-items: center; gap: 16px; }
.meal-emoji { font-size: 44px; line-height: 1; flex-shrink: 0; }
.meal-info { flex: 1; min-width: 0; }
.meal-name { font-size: 19px; font-weight: 600; color: var(--text); margin-bottom: 4px; line-height: 1.3; }
.meal-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }
.meal-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.tag {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em;
  padding: 2px 8px; border-radius: 4px;
  background: var(--surface); color: var(--muted); border: 1px solid var(--border);
}
.btn-reroll {
  width: 42px; height: 42px; background: none;
  border: 1px solid var(--border); border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 20px; color: var(--muted); flex-shrink: 0;
  transition: border-color 0.15s, color 0.15s, transform 0.3s;
}
.btn-reroll:hover { border-color: var(--accent); color: var(--accent); }
.btn-reroll:active { transform: rotate(180deg); }

/* SIDEBAR */
.sidebar { display: flex; flex-direction: column; gap: 16px; position: sticky; top: 24px; }

.side-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 18px;
}
.side-title {
  font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--muted); margin-bottom: 16px;
}

/* Macros */
.macros-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; text-align: center; }
.macro-val { font-family: 'Bebas Neue', sans-serif; font-size: 34px; line-height: 1; }
.macro-val.p { color: var(--accent); }
.macro-val.c { color: var(--orange); }
.macro-val.f { color: var(--blue); }
.macro-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 3px; }

/* Breakdown */
.meal-breakdown { display: flex; flex-direction: column; gap: 10px; }
.breakdown-row { display: flex; align-items: center; gap: 10px; }
.breakdown-label { font-size: 12px; color: var(--muted); text-transform: capitalize; width: 70px; flex-shrink: 0; }
.breakdown-bar-wrap { flex: 1; height: 5px; background: var(--border); border-radius: 999px; overflow: hidden; }
.breakdown-bar { height: 100%; background: var(--accent); border-radius: 999px; transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1); }
.breakdown-val { font-size: 12px; font-weight: 600; color: var(--text); width: 30px; text-align: right; flex-shrink: 0; }

/* History */
.hist-list { display: flex; flex-direction: column; gap: 10px; }
.hist-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px;
}
.hist-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.hist-date { font-size: 12px; font-weight: 600; color: var(--text); }
.hist-prot { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--accent); }
.hist-meals { font-size: 11px; color: var(--muted); line-height: 1.7; }
.btn-del {
  background: none; border: none; color: var(--muted);
  font-size: 14px; cursor: pointer; padding: 2px 4px;
  margin-left: 6px; transition: color 0.12s;
}
.btn-del:hover { color: var(--red); }
.empty-hist { font-size: 13px; color: var(--muted); text-align: center; padding: 12px 0; line-height: 1.8; }

/* ANIMATIONS */
@keyframes pop-in {
  from { opacity: 0; transform: translateY(6px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.pop { animation: pop-in 0.25s cubic-bezier(0.34,1.56,0.64,1) both; }

/* TOAST */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--accent); color: #0d0d0d;
  font-size: 13px; font-weight: 600;
  padding: 10px 24px; border-radius: 999px;
  opacity: 0; transition: opacity 0.2s, transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 200; pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* RESPONSIVE */
@media (max-width: 860px) {
  .main-grid { grid-template-columns: 1fr; }
  .sidebar { position: static; }
  /* On mobile, show macros+breakdown inline under meals, history last */
}

@media (max-width: 600px) {
  .app { padding: 0 16px 60px; }
  header { padding: 28px 0 18px; }
  .logo { font-size: 46px; }
  .protein-num { font-size: 40px; }
  .action-bar { padding: 16px 0 18px; gap: 10px; }
  .btn-shuffle { font-size: 19px; padding: 13px 18px; }
  .btn-save { padding: 13px 18px; font-size: 13px; }
  .meal-body { padding: 14px 14px; gap: 12px; }
  .meal-emoji { font-size: 36px; }
  .meal-name { font-size: 16px; }
  .meal-desc { font-size: 12px; }
  .btn-reroll { width: 38px; height: 38px; font-size: 17px; }
  .macro-val { font-size: 28px; }
}

@media (max-width: 380px) {
  .logo { font-size: 38px; }
  .protein-num { font-size: 34px; }
}
</style>
</head>
<body>
<div class="app">

  <header>
    <div>
      <div class="logo">150<span>G</span></div>
      <div class="logo-sub">Daily Protein Planner · Gym Mode</div>
    </div>
    <div class="header-right">
      <div class="protein-num" id="prot-num">0g</div>
      <div class="protein-label">of 150g protein today</div>
    </div>
  </header>

  <div class="progress-section">
    <div class="prog-row">
      <span id="prog-pct">0% of goal</span>
      <span id="prog-remain">150g remaining</span>
    </div>
    <div class="prog-track">
      <div class="prog-fill" id="prog-fill" style="width:0%"></div>
    </div>
    <div class="over-warn" id="over-warn" style="display:none">⚠ Over target — consider lighter options</div>
  </div>

  <div class="action-bar">
    <button class="btn-shuffle" onclick="shuffleAll()">⚡ Shuffle My Meals</button>
    <button class="btn-save" onclick="savePlan()">💾 Save Today's Plan</button>
  </div>

  <div class="main-grid">
    <div class="meals-col" id="meals-col"></div>

    <div class="sidebar">
      <div class="side-card">
        <div class="side-title">Today's macros</div>
        <div class="macros-row">
          <div><div class="macro-val p" id="m-p">—</div><div class="macro-lbl">Protein</div></div>
          <div><div class="macro-val c" id="m-c">—</div><div class="macro-lbl">Carbs</div></div>
          <div><div class="macro-val f" id="m-f">—</div><div class="macro-lbl">Fat</div></div>
        </div>
      </div>

      <div class="side-card">
        <div class="side-title">Protein per meal</div>
        <div class="meal-breakdown" id="breakdown"></div>
      </div>

      <div class="side-card">
        <div class="side-title">Saved plans</div>
        <div class="hist-list" id="hist-list"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MEALS = {
  breakfast: [
    { name:"Scrambled eggs & turkey", emoji:"🍳", desc:"3 eggs + 100g turkey breast, whole wheat toast", protein:42, carbs:28, fat:14, tags:["quick","high-protein"] },
    { name:"Greek yogurt & chicken", emoji:"🥣", desc:"200g Greek yogurt + 80g shredded chicken, granola", protein:45, carbs:22, fat:8, tags:["quick","no-cook"] },
    { name:"Egg white omelette", emoji:"🥚", desc:"5 egg whites, spinach, mushrooms, whole wheat toast", protein:35, carbs:26, fat:5, tags:["quick","low-fat"] },
    { name:"Tuna & avocado toast", emoji:"🥑", desc:"1 can tuna, half avocado, 2 slices sourdough", protein:38, carbs:30, fat:16, tags:["quick","no-cook"] },
    { name:"Protein oatmeal bowl", emoji:"🥞", desc:"Oats, 2 scoops protein powder, banana, almond butter", protein:46, carbs:55, fat:12, tags:["quick","filling"] },
    { name:"Smoked salmon toast", emoji:"🐟", desc:"100g smoked salmon, 2 poached eggs, rye bread", protein:40, carbs:24, fat:14, tags:["quick","omega-3"] },
    { name:"Chicken & egg breakfast bowl", emoji:"🍲", desc:"100g chicken breast, 2 eggs, brown rice, hot sauce", protein:52, carbs:34, fat:10, tags:["filling","high-protein"] },
    { name:"Turkey & egg wrap", emoji:"🌯", desc:"3 egg whites, 80g turkey, whole wheat wrap, spinach", protein:44, carbs:30, fat:8, tags:["quick","portable"] },
    { name:"Beef & egg rice bowl", emoji:"🍳", desc:"80g lean beef mince, 2 eggs, jasmine rice, soy sauce", protein:48, carbs:38, fat:14, tags:["filling","high-protein"] },
    { name:"Shrimp scramble", emoji:"🍤", desc:"150g shrimp, 2 eggs, peppers, whole wheat toast", protein:44, carbs:26, fat:10, tags:["quick","light"] },
  ],
  lunch: [
    { name:"Grilled chicken salad", emoji:"🥗", desc:"200g chicken breast, mixed greens, cherry tomatoes, olive oil", protein:50, carbs:12, fat:14, tags:["quick","low-carb"] },
    { name:"Tuna rice bowl", emoji:"🍚", desc:"2 cans tuna, brown rice, cucumber, soy-lime dressing", protein:52, carbs:48, fat:8, tags:["quick","high-protein"] },
    { name:"Turkey & avocado wrap", emoji:"🌯", desc:"150g turkey breast, avocado, lettuce, whole wheat wrap", protein:48, carbs:32, fat:16, tags:["quick","portable"] },
    { name:"Beef stir-fry bowl", emoji:"🥩", desc:"150g lean beef strips, broccoli, peppers, brown rice", protein:46, carbs:44, fat:12, tags:["quick","filling"] },
    { name:"Salmon & quinoa bowl", emoji:"🐟", desc:"150g baked salmon, quinoa, edamame, lemon-dill dressing", protein:50, carbs:40, fat:18, tags:["omega-3","balanced"] },
    { name:"Chicken shawarma bowl", emoji:"🫙", desc:"200g chicken thigh, hummus, cucumber, brown rice, herbs", protein:52, carbs:50, fat:14, tags:["flavorful","filling"] },
    { name:"Shrimp & noodle bowl", emoji:"🍜", desc:"200g shrimp, rice noodles, bok choy, ginger-soy broth", protein:44, carbs:46, fat:6, tags:["quick","low-fat"] },
    { name:"Chicken & egg rice bowl", emoji:"🍳", desc:"150g chicken breast, 2 eggs, jasmine rice, teriyaki", protein:56, carbs:52, fat:10, tags:["high-protein","filling"] },
    { name:"Beef & veggie wrap", emoji:"🌯", desc:"150g lean beef strips, peppers, onion, whole wheat wrap", protein:46, carbs:36, fat:14, tags:["quick","portable"] },
    { name:"Tuna pasta bowl", emoji:"🍝", desc:"1 can tuna, whole wheat pasta, cherry tomatoes, olive oil", protein:44, carbs:54, fat:10, tags:["filling","quick"] },
  ],
  dinner: [
    { name:"Baked salmon & sweet potato", emoji:"🐟", desc:"200g salmon fillet, roasted sweet potato, steamed broccoli", protein:46, carbs:42, fat:16, tags:["omega-3","quick"] },
    { name:"Chicken breast & rice", emoji:"🍗", desc:"250g grilled chicken breast, brown rice, green beans", protein:58, carbs:48, fat:8, tags:["classic","high-protein"] },
    { name:"Lean beef & vegetable bowl", emoji:"🥩", desc:"200g 90% lean ground beef, roasted veg, quinoa", protein:52, carbs:40, fat:14, tags:["filling","high-protein"] },
    { name:"Turkey mince stir-fry", emoji:"🥬", desc:"200g turkey mince, broccoli, snap peas, garlic, soy, rice", protein:50, carbs:46, fat:10, tags:["quick","lean"] },
    { name:"Shrimp & vegetable curry", emoji:"🍛", desc:"250g shrimp, light coconut milk, spinach, brown rice", protein:46, carbs:50, fat:10, tags:["flavorful","quick"] },
    { name:"Tuna steak & potatoes", emoji:"🐡", desc:"200g tuna steak, roasted potatoes, asparagus, lemon butter", protein:52, carbs:38, fat:12, tags:["omega-3","restaurant-feel"] },
    { name:"Chicken tikka & rice", emoji:"🍲", desc:"200g chicken breast, light tikka sauce, basmati rice", protein:54, carbs:52, fat:10, tags:["flavorful","quick"] },
    { name:"Beef bolognese", emoji:"🍝", desc:"150g lean beef mince, whole wheat pasta, tomato sauce", protein:48, carbs:58, fat:12, tags:["comfort","filling"] },
    { name:"Grilled chicken & sweet potato", emoji:"🍠", desc:"220g chicken thigh, roasted sweet potato, mixed salad", protein:54, carbs:44, fat:12, tags:["balanced","quick"] },
    { name:"Beef & broccoli bowl", emoji:"🥦", desc:"180g lean beef, steamed broccoli, garlic, jasmine rice", protein:50, carbs:42, fat:12, tags:["quick","high-protein"] },
  ]
};

const TYPES = ["breakfast","lunch","dinner"];
let current = {};
let saved = JSON.parse(localStorage.getItem("pp_plans")||"[]");

function rnd(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function shuffleAll(){
  TYPES.forEach(t=>{ current[t]=rnd(MEALS[t]); });
  renderMeals(); updateTotals();
}

function reroll(type){
  const pool=MEALS[type].filter(d=>d.name!==(current[type]||{}).name);
  current[type]=rnd(pool.length?pool:MEALS[type]);
  renderMeals(); updateTotals();
}

function renderMeals(){
  document.getElementById("meals-col").innerHTML=TYPES.map(type=>{
    const d=current[type]; if(!d) return "";
    return `<div class="meal-card pop">
      <div class="meal-head">
        <span class="meal-type-label">${type}</span>
        <span class="prot-badge">${d.protein}g protein</span>
      </div>
      <div class="meal-body">
        <div class="meal-emoji">${d.emoji}</div>
        <div class="meal-info">
          <div class="meal-name">${d.name}</div>
          <div class="meal-desc">${d.desc}</div>
          <div class="meal-tags">${d.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
        </div>
        <button class="btn-reroll" onclick="reroll('${type}')" title="Re-roll ${type}">↻</button>
      </div>
    </div>`;
  }).join("");
}

function updateTotals(){
  const vals=TYPES.map(t=>current[t]).filter(Boolean);
  if(!vals.length) return;
  const p=vals.reduce((s,d)=>s+d.protein,0);
  const c=vals.reduce((s,d)=>s+d.carbs,0);
  const f=vals.reduce((s,d)=>s+d.fat,0);
  const pct=Math.min(Math.round(p/150*100),100);
  document.getElementById("prot-num").textContent=p+"g";
  document.getElementById("prog-fill").style.width=pct+"%";
  document.getElementById("prog-fill").style.background=p>=150?"#c8f135":p>=100?"#ff9a3c":"#ff4d4d";
  document.getElementById("prog-pct").textContent=pct+"% of goal";
  document.getElementById("prog-remain").textContent=p>=150?"✓ Goal reached!":Math.max(150-p,0)+"g remaining";
  document.getElementById("m-p").textContent=p;
  document.getElementById("m-c").textContent=c;
  document.getElementById("m-f").textContent=f;
  document.getElementById("over-warn").style.display=p>165?"block":"none";
  document.getElementById("breakdown").innerHTML=TYPES.map(type=>{
    const d=current[type]; if(!d) return "";
    return `<div class="breakdown-row">
      <span class="breakdown-label">${type}</span>
      <div class="breakdown-bar-wrap"><div class="breakdown-bar" style="width:${Math.round(d.protein/60*100)}%"></div></div>
      <span class="breakdown-val">${d.protein}g</span>
    </div>`;
  }).join("");
}

function savePlan(){
  const vals=TYPES.map(t=>current[t]).filter(Boolean);
  if(vals.length<3){ toast("Shuffle your meals first!"); return; }
  const p=vals.reduce((s,d)=>s+d.protein,0);
  const date=new Date().toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"});
  saved.unshift({date,protein:p,meals:TYPES.map(t=>current[t].name),emojis:TYPES.map(t=>current[t].emoji)});
  if(saved.length>10) saved.pop();
  localStorage.setItem("pp_plans",JSON.stringify(saved));
  renderHistory(); toast("Plan saved!");
}

function deletePlan(i){
  saved.splice(i,1);
  localStorage.setItem("pp_plans",JSON.stringify(saved));
  renderHistory();
}

function renderHistory(){
  const el=document.getElementById("hist-list");
  if(!saved.length){
    el.innerHTML=`<div class="empty-hist">No saved plans yet.<br>Shuffle and save your first plan!</div>`;
    return;
  }
  el.innerHTML=saved.map((p,i)=>`
    <div class="hist-item">
      <div class="hist-top">
        <span class="hist-date">${p.date}</span>
        <div style="display:flex;align-items:center;">
          <span class="hist-prot">${p.protein}g</span>
          <button class="btn-del" onclick="deletePlan(${i})">✕</button>
        </div>
      </div>
      <div class="hist-meals">${p.meals.map((m,j)=>`${p.emojis?.[j]||""} ${m}`).join("<br>")}</div>
    </div>`).join("");
}

function toast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),2400);
}

shuffleAll();
renderHistory();
</script>
</body>
</html>
