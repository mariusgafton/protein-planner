<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0d0d">
<title>150G — Protein Planner</title>
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;150G Protein Planner&quot;,&quot;short_name&quot;:&quot;150G&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;#0d0d0d&quot;,&quot;theme_color&quot;:&quot;#0d0d0d&quot;}">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0d0d0d;
  --surface: #161616;
  --card: #1c1c1c;
  --border: #2a2a2a;
  --accent: #c8f135;
  --text: #f0f0f0;
  --muted: #666;
  --red: #ff4d4d;
  --orange: #ff9a3c;
  --blue: #8ec5f7;
  --safe: env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  display: flex;
  flex-direction: column;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
}

/* ── PAGES ── */
.page { display: none; flex-direction: column; height: 100%; overflow: hidden; }
.page.active { display: flex; }

/* ── SCROLLABLE CONTENT ── */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(80px + var(--safe));
}

/* ── HEADER ── */
.top-bar {
  padding: 52px 20px 16px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.top-row {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 44px;
  line-height: 1;
  letter-spacing: 2px;
  color: var(--accent);
}
.logo span { color: var(--text); }

.logo-sub {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.07em;
  text-transform: uppercase;
  margin-top: 2px;
}

.protein-count {
  text-align: right;
}
.protein-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  line-height: 1;
  color: var(--accent);
}
.protein-label {
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.07em;
}

/* ── PROGRESS ── */
.prog-wrap { padding: 12px 20px 0; flex-shrink: 0; }
.prog-track {
  height: 5px;
  background: var(--border);
  border-radius: 999px;
  overflow: hidden;
  margin-bottom: 5px;
}
.prog-fill {
  height: 100%;
  border-radius: 999px;
  background: var(--accent);
  transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1), background 0.4s;
}
.prog-row {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--muted);
}

/* ── SHUFFLE BTN ── */
.shuffle-wrap { padding: 14px 20px 10px; flex-shrink: 0; }
.btn-shuffle {
  width: 100%;
  padding: 16px;
  background: var(--accent);
  color: #0d0d0d;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 3px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: transform 0.12s, background 0.12s;
  -webkit-user-select: none;
}
.btn-shuffle:active { transform: scale(0.97); background: #d6ff3d; }

/* ── MEAL CARDS ── */
.meals-list { padding: 0 16px; }

.meal-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 12px;
  overflow: hidden;
  transition: border-color 0.2s;
}

.meal-head {
  padding: 11px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.meal-type-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 2px;
  color: var(--muted);
}

.prot-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 999px;
  background: rgba(200,241,53,0.12);
  color: var(--accent);
  border: 1px solid rgba(200,241,53,0.22);
}

.meal-body {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.meal-emoji { font-size: 38px; line-height: 1; flex-shrink: 0; }

.meal-info { flex: 1; min-width: 0; }

.meal-name {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 3px;
  line-height: 1.3;
}

.meal-desc {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.5;
}

.meal-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 7px;
}

.tag {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  padding: 2px 7px;
  border-radius: 4px;
  background: var(--surface);
  color: var(--muted);
  border: 1px solid var(--border);
}

.btn-reroll {
  width: 40px;
  height: 40px;
  background: none;
  border: 1px solid var(--border);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 18px;
  color: var(--muted);
  flex-shrink: 0;
  transition: border-color 0.12s, color 0.12s, transform 0.3s;
}
.btn-reroll:active { border-color: var(--accent); color: var(--accent); transform: rotate(180deg); }

/* ── MACROS ── */
.macros-card {
  margin: 4px 16px 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
}
.macros-title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-bottom: 12px;
}
.macros-row {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 8px;
  text-align: center;
}
.macro-val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 30px;
  line-height: 1;
}
.macro-val.p { color: var(--accent); }
.macro-val.c { color: var(--orange); }
.macro-val.f { color: var(--blue); }
.macro-lbl {
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-top: 2px;
}

/* ── HISTORY PAGE ── */
.page-header {
  padding: 52px 20px 16px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.page-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  letter-spacing: 2px;
  color: var(--text);
}
.page-sub {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}

.empty-state {
  text-align: center;
  padding: 60px 24px;
  color: var(--muted);
  font-size: 14px;
  line-height: 1.8;
}
.empty-icon { font-size: 40px; margin-bottom: 12px; }

.hist-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin: 16px 16px 0;
  padding: 14px 16px;
}
.hist-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.hist-date { font-size: 13px; font-weight: 600; color: var(--text); }
.hist-prot {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  color: var(--accent);
}
.hist-meals { font-size: 12px; color: var(--muted); line-height: 1.7; }
.btn-del {
  background: none; border: none; color: var(--muted);
  font-size: 16px; cursor: pointer; padding: 4px 6px;
  transition: color 0.12s;
}
.btn-del:active { color: var(--red); }

.save-row {
  padding: 10px 16px 4px;
  flex-shrink: 0;
}
.btn-save {
  width: 100%;
  padding: 13px;
  background: none;
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: border-color 0.12s, background 0.12s;
}
.btn-save:active { border-color: var(--accent); background: rgba(200,241,53,0.06); }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  padding-bottom: var(--safe);
  z-index: 100;
}
.nav-btn {
  flex: 1;
  padding: 12px 8px 10px;
  background: none;
  border: none;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  color: var(--muted);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  transition: color 0.15s;
}
.nav-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.nav-btn.active { color: var(--accent); }

/* ── ANIMATIONS ── */
@keyframes pop-in {
  from { opacity: 0; transform: translateY(8px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.pop { animation: pop-in 0.28s cubic-bezier(0.34,1.56,0.64,1) both; }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: calc(72px + var(--safe) + 12px);
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--accent);
  color: #0d0d0d;
  font-size: 13px;
  font-weight: 600;
  padding: 10px 22px;
  border-radius: 999px;
  opacity: 0;
  transition: opacity 0.2s, transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 200;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── OVER WARNING ── */
.over-warn {
  font-size: 11px;
  color: var(--orange);
  padding: 6px 20px 2px;
  flex-shrink: 0;
}
</style>
</head>
<body>

<!-- PAGE: TODAY -->
<div class="page active" id="page-today">
  <div class="top-bar">
    <div class="top-row">
      <div>
        <div class="logo">150<span>G</span></div>
        <div class="logo-sub">Daily Protein Planner</div>
      </div>
      <div class="protein-count">
        <div class="protein-num" id="prot-num">0g</div>
        <div class="protein-label">of 150g today</div>
      </div>
    </div>
  </div>

  <div class="prog-wrap">
    <div class="prog-track">
      <div class="prog-fill" id="prog-fill" style="width:0%"></div>
    </div>
    <div class="prog-row">
      <span id="prog-pct">0% of goal</span>
      <span id="prog-remain">150g remaining</span>
    </div>
  </div>

  <div class="over-warn" id="over-warn" style="display:none">⚠ Over target — consider lighter options</div>

  <div class="shuffle-wrap">
    <button class="btn-shuffle" onclick="shuffleAll()">⚡ Shuffle My Meals</button>
  </div>

  <div class="scroll-area">
    <div class="meals-list" id="meals-list"></div>

    <div class="macros-card">
      <div class="macros-title">Today's estimated macros</div>
      <div class="macros-row">
        <div>
          <div class="macro-val p" id="m-p">—</div>
          <div class="macro-lbl">Protein (g)</div>
        </div>
        <div>
          <div class="macro-val c" id="m-c">—</div>
          <div class="macro-lbl">Carbs (g)</div>
        </div>
        <div>
          <div class="macro-val f" id="m-f">—</div>
          <div class="macro-lbl">Fat (g)</div>
        </div>
      </div>
    </div>

    <div class="save-row">
      <button class="btn-save" onclick="savePlan()">💾 Save Today's Plan</button>
    </div>
  </div>
</div>

<!-- PAGE: HISTORY -->
<div class="page" id="page-history">
  <div class="page-header">
    <div class="page-title">Saved Plans</div>
    <div class="page-sub">Your recent meal plans</div>
  </div>
  <div class="scroll-area" id="hist-scroll">
    <div id="hist-content"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-today" onclick="showPage('today')">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Today
  </button>
  <button class="nav-btn" id="nav-history" onclick="showPage('history')">
    <svg viewBox="0 0 24 24"><polyline points="12 8 12 12 14 14"/><path d="M3.05 11a9 9 0 1 0 .5-4"/><polyline points="3 3 3 7 7 7"/></svg>
    History
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
const MEALS = {
  breakfast: [
    { name:"Scrambled eggs & turkey", emoji:"🍳", desc:"3 eggs + 100g turkey breast, whole wheat toast", protein:42, carbs:28, fat:14, tags:["quick","high-protein"] },
    { name:"Greek yogurt & chicken", emoji:"🥣", desc:"200g Greek yogurt + 80g shredded chicken, granola", protein:45, carbs:22, fat:8, tags:["quick","no-cook"] },
    { name:"Egg white omelette", emoji:"🥚", desc:"5 egg whites, spinach, mushrooms, whole wheat toast", protein:35, carbs:26, fat:5, tags:["quick","low-fat"] },
    { name:"Tuna & avocado toast", emoji:"🥑", desc:"1 can tuna, half avocado, 2 slices sourdough", protein:38, carbs:30, fat:16, tags:["quick","no-cook"] },
    { name:"Protein oatmeal bowl", emoji:"🥞", desc:"Oats, 2 scoops protein powder, banana, almond butter", protein:46, carbs:55, fat:12, tags:["quick","filling"] },
    { name:"Smoked salmon toast", emoji:"🐟", desc:"100g smoked salmon, 2 poached eggs, rye bread", protein:40, carbs:24, fat:14, tags:["quick","omega-3"] },
    { name:"Chicken & egg breakfast bowl", emoji:"🍲", desc:"100g chicken breast, 2 eggs, brown rice, hot sauce", protein:52, carbs:34, fat:10, tags:["filling","high-protein"] },
    { name:"Turkey & egg wrap", emoji:"🌯", desc:"3 egg whites, 80g turkey, whole wheat wrap, spinach", protein:44, carbs:30, fat:8, tags:["quick","portable"] },
    { name:"Beef & egg rice bowl", emoji:"🍳", desc:"80g lean beef mince, 2 eggs, jasmine rice, soy sauce", protein:48, carbs:38, fat:14, tags:["filling","high-protein"] },
    { name:"Shrimp scramble", emoji:"🍤", desc:"150g shrimp, 2 eggs, peppers, whole wheat toast", protein:44, carbs:26, fat:10, tags:["quick","light"] },
  ],
  lunch: [
    { name:"Grilled chicken salad", emoji:"🥗", desc:"200g chicken breast, mixed greens, cherry tomatoes, olive oil", protein:50, carbs:12, fat:14, tags:["quick","low-carb"] },
    { name:"Tuna rice bowl", emoji:"🍚", desc:"2 cans tuna, brown rice, cucumber, soy-lime dressing", protein:52, carbs:48, fat:8, tags:["quick","high-protein"] },
    { name:"Turkey & avocado wrap", emoji:"🌯", desc:"150g turkey breast, avocado, lettuce, whole wheat wrap", protein:48, carbs:32, fat:16, tags:["quick","portable"] },
    { name:"Beef stir-fry bowl", emoji:"🥩", desc:"150g lean beef strips, broccoli, peppers, brown rice", protein:46, carbs:44, fat:12, tags:["quick","filling"] },
    { name:"Salmon & quinoa bowl", emoji:"🐟", desc:"150g baked salmon, quinoa, edamame, lemon-dill dressing", protein:50, carbs:40, fat:18, tags:["omega-3","balanced"] },
    { name:"Chicken shawarma bowl", emoji:"🫙", desc:"200g chicken thigh, hummus, cucumber, brown rice, herbs", protein:52, carbs:50, fat:14, tags:["flavorful","filling"] },
    { name:"Shrimp & noodle bowl", emoji:"🍜", desc:"200g shrimp, rice noodles, bok choy, ginger-soy broth", protein:44, carbs:46, fat:6, tags:["quick","low-fat"] },
    { name:"Chicken & egg rice bowl", emoji:"🍳", desc:"150g chicken breast, 2 eggs, jasmine rice, teriyaki", protein:56, carbs:52, fat:10, tags:["high-protein","filling"] },
    { name:"Beef & veggie wrap", emoji:"🌯", desc:"150g lean beef strips, peppers, onion, whole wheat wrap", protein:46, carbs:36, fat:14, tags:["quick","portable"] },
    { name:"Tuna pasta bowl", emoji:"🍝", desc:"1 can tuna, whole wheat pasta, cherry tomatoes, olive oil", protein:44, carbs:54, fat:10, tags:["filling","quick"] },
  ],
  dinner: [
    { name:"Baked salmon & sweet potato", emoji:"🐟", desc:"200g salmon fillet, roasted sweet potato, steamed broccoli", protein:46, carbs:42, fat:16, tags:["omega-3","quick"] },
    { name:"Chicken breast & rice", emoji:"🍗", desc:"250g grilled chicken breast, brown rice, green beans", protein:58, carbs:48, fat:8, tags:["classic","high-protein"] },
    { name:"Lean beef & vegetable bowl", emoji:"🥩", desc:"200g 90% lean ground beef, roasted veg, quinoa", protein:52, carbs:40, fat:14, tags:["filling","high-protein"] },
    { name:"Turkey mince stir-fry", emoji:"🥬", desc:"200g turkey mince, broccoli, snap peas, garlic, soy, rice", protein:50, carbs:46, fat:10, tags:["quick","lean"] },
    { name:"Shrimp & vegetable curry", emoji:"🍛", desc:"250g shrimp, light coconut milk, spinach, brown rice", protein:46, carbs:50, fat:10, tags:["flavorful","quick"] },
    { name:"Tuna steak & potatoes", emoji:"🐡", desc:"200g tuna steak, roasted potatoes, asparagus, lemon butter", protein:52, carbs:38, fat:12, tags:["omega-3","restaurant-feel"] },
    { name:"Chicken tikka & rice", emoji:"🍲", desc:"200g chicken breast, light tikka sauce, basmati rice", protein:54, carbs:52, fat:10, tags:["flavorful","quick"] },
    { name:"Beef bolognese", emoji:"🍝", desc:"150g lean beef mince, whole wheat pasta, tomato sauce", protein:48, carbs:58, fat:12, tags:["comfort","filling"] },
    { name:"Grilled chicken & sweet potato", emoji:"🍠", desc:"220g chicken thigh, roasted sweet potato, mixed salad", protein:54, carbs:44, fat:12, tags:["balanced","quick"] },
    { name:"Beef & broccoli bowl", emoji:"🥦", desc:"180g lean beef, steamed broccoli, garlic, jasmine rice", protein:50, carbs:42, fat:12, tags:["quick","high-protein"] },
  ]
};

const TYPES = ["breakfast","lunch","dinner"];
let current = {};
let saved = JSON.parse(localStorage.getItem("pp_plans") || "[]");

function rnd(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function shuffleAll() {
  TYPES.forEach(t => { current[t] = rnd(MEALS[t]); });
  renderMeals();
  updateTotals();
}

function reroll(type) {
  const pool = MEALS[type].filter(d => d.name !== (current[type] || {}).name);
  current[type] = rnd(pool.length ? pool : MEALS[type]);
  renderMeals();
  updateTotals();
}

function renderMeals() {
  const list = document.getElementById("meals-list");
  list.innerHTML = TYPES.map(type => {
    const d = current[type];
    if (!d) return "";
    return `
      <div class="meal-card pop">
        <div class="meal-head">
          <span class="meal-type-label">${type}</span>
          <span class="prot-badge">${d.protein}g protein</span>
        </div>
        <div class="meal-body">
          <div class="meal-emoji">${d.emoji}</div>
          <div class="meal-info">
            <div class="meal-name">${d.name}</div>
            <div class="meal-desc">${d.desc}</div>
            <div class="meal-tags">${d.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
          </div>
          <button class="btn-reroll" onclick="reroll('${type}')" aria-label="Re-roll ${type}">↻</button>
        </div>
      </div>`;
  }).join("");
}

function updateTotals() {
  const vals = TYPES.map(t => current[t]).filter(Boolean);
  if (!vals.length) return;
  const p = vals.reduce((s,d)=>s+d.protein,0);
  const c = vals.reduce((s,d)=>s+d.carbs,0);
  const f = vals.reduce((s,d)=>s+d.fat,0);
  const pct = Math.min(Math.round(p/150*100), 100);
  const remain = Math.max(150 - p, 0);

  document.getElementById("prot-num").textContent = p + "g";
  document.getElementById("prog-fill").style.width = pct + "%";
  document.getElementById("prog-fill").style.background = p >= 150 ? "#c8f135" : p >= 100 ? "#ff9a3c" : "#ff4d4d";
  document.getElementById("prog-pct").textContent = pct + "% of goal";
  document.getElementById("prog-remain").textContent = remain > 0 ? remain + "g remaining" : "✓ Goal reached!";
  document.getElementById("m-p").textContent = p;
  document.getElementById("m-c").textContent = c;
  document.getElementById("m-f").textContent = f;
  document.getElementById("over-warn").style.display = p > 165 ? "block" : "none";
}

function savePlan() {
  const vals = TYPES.map(t => current[t]).filter(Boolean);
  if (vals.length < 3) { toast("Shuffle your meals first!"); return; }
  const p = vals.reduce((s,d)=>s+d.protein,0);
  const now = new Date();
  const date = now.toLocaleDateString("en-GB", { weekday:"short", day:"numeric", month:"short", year:"numeric" });
  saved.unshift({ date, protein: p, meals: TYPES.map(t=>current[t].name), emojis: TYPES.map(t=>current[t].emoji) });
  if (saved.length > 14) saved.pop();
  localStorage.setItem("pp_plans", JSON.stringify(saved));
  toast("Plan saved!");
  renderHistory();
}

function deletePlan(i) {
  saved.splice(i, 1);
  localStorage.setItem("pp_plans", JSON.stringify(saved));
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById("hist-content");
  if (!saved.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div>No saved plans yet.<br>Shuffle your meals and save a plan!</div>`;
    return;
  }
  el.innerHTML = saved.map((p,i) => `
    <div class="hist-card">
      <div class="hist-top">
        <div>
          <div class="hist-date">${p.date}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="hist-prot">${p.protein}g</div>
          <button class="btn-del" onclick="deletePlan(${i})">✕</button>
        </div>
      </div>
      <div class="hist-meals">
        ${p.meals.map((m,j)=>`${p.emojis?.[j]||""} <strong>${TYPES[j]}</strong>: ${m}`).join("<br>")}
      </div>
    </div>
  `).join("");
}

function showPage(name) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("page-" + name).classList.add("active");
  document.getElementById("nav-" + name).classList.add("active");
  if (name === "history") renderHistory();
}

function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2400);
}

// Init
shuffleAll();
</script>
</body>
</html>
